<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban HR - HR Platform</title>
    <link rel="stylesheet" href="../styles/index.css" />
  </head>
  <body>
    <header class="header">
      <nav class="navbar">
        <div class="logo">
          <img src="../images/logo.png" alt="Logo HR Platform" />
        </div>
        <ul class="nav-links">
          <li><a href="index.html">Start</a></li>
          <li><a href="hr-dashboard.html">Panel HR</a></li>
          <li><a href="hr-applications.html">Aplikacje</a></li>
          <li><a href="hr-kanban.html">Kanban</a></li>
          <li><a href="hr-employees.html">Pracownicy</a></li>
          <li><a href="hr-job-offers.html">Moje Oferty</a></li>
          <li><a href="hr-job-offers-archive.html">Archiwum ofert</a></li>
          <li><a href="change-password.html">Zmień hasło</a></li>
          <li><a href="#" id="logoutBtn">Wyloguj</a></li>
        </ul>
      </nav>
    </header>

    <main class="kanban-page">
      <h1>Kanban rekrutacyjny</h1>
      <p>
        Przeciągnij kandydata między etapami, aby śledzić proces rekrutacji.
      </p>
      <div class="kanban-board">
        <div class="kanban-column" data-status="ACCEPTED">
          <h2>1. Akceptacja</h2>
          <div class="kanban-column-body" id="acceptedColumn"></div>
        </div>

        <div class="kanban-column" data-status="INTERVIEW">
          <h2>2. Rozmowa rekrutacyjna</h2>
          <div class="kanban-column-body" id="interviewColumn"></div>
        </div>

        <div class="kanban-column" data-status="CONTRACT_SIGNING">
          <h2>3. Podpisanie umowy</h2>
          <div class="kanban-column-body" id="contractColumn"></div>
        </div>

        <div class="kanban-column" data-status="HIRED">
          <h2>4. Zatrudnienie</h2>
          <div class="kanban-column-body" id="hiredColumn"></div>
        </div>
      </div>
    </main>

    <script src="../scripts/navbar-anim.js"></script>
    <script src="../scripts/hr-kanban.js"></script>
  </body>
