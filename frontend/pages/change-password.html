<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zmiana hasła - HR Platform</title>
    <link rel="stylesheet" href="../styles/index.css" />
  </head>
  <body>
    <header class="header">
      <nav class="navbar">
        <div class="logo">HR Platform</div>
        <ul class="nav-links">
          <li><a href="index.html">Start</a></li>
          <li id="jobsLink" style="display: none">
            <a href="jobs.html">Oferty pracy</a>
          </li>
          <li id="userDashboardLink" style="display: none">
            <a href="user-dashboard.html">Mój panel</a>
          </li>
          <li id="employeeDashboardLink" style="display: none">
            <a href="employee-dashboard.html">Mój panel</a>
          </li>
          <li id="hrLink" style="display: none">
            <a href="hr-dashboard.html">Panel HR</a>
          </li>
          <li><a href="change-password.html">Zmień hasło</a></li>
          <li><a href="#" id="logoutBtn">Wyloguj</a></li>
        </ul>
      </nav>
    </header>

    <main class="dashboard-wrapper">
      <section class="dashboard-card">
        <h2>Zmień hasło</h2>
        <form id="changePasswordForm" class="profile-form">
          <div>
            <label for="oldPassword">Stare hasło</label>
            <input
              type="password"
              id="oldPassword"
              class="profile-input"
              required
            />
          </div>

          <div>
            <label for="newPassword">Nowe hasło</label>
            <input
              type="password"
              id="newPassword"
              class="profile-input"
              required
            />
          </div>

          <div>
            <label for="confirmPassword">Potwierdź nowe hasło</label>
            <input
              type="password"
              id="confirmPassword"
              class="profile-input"
              required
            />
          </div>

          <button type="submit" class="dashboard-btn">Zmień hasło</button>
        </form>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; 2026 HR Platform</p>
    </footer>
    <script src="../scripts/navbar-anim.js"></script>
    <script src="../scripts/change-password.js"></script>
  </body>
</html>
