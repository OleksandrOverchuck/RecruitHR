<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logowanie - HR Platform</title>
    <link rel="stylesheet" href="../styles/index.css" />
  </head>
  <body>
    <header class="header">
      <nav class="navbar">
        <div class="logo">HR Platform</div>
        <ul class="nav-links">
          <li><a href="index.html">Start</a></li>
          <li><a href="jobs.html">Oferty pracy</a></li>
          <li><a href="index.html#about">O systemie</a></li>
          <li><a href="login.html">Logowanie</a></li>
        </ul>
      </nav>
    </header>

    <main class="auth-page">
      <section class="auth-container">
        <div class="auth-card">
          <h1>Logowanie</h1>
          <p class="auth-subtitle">Zaloguj się do panelu HR Platform</p>

          <form class="auth-form" id="loginForm">
            <div class="form-group">
              <label for="email">Adres e-mail</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Wpisz adres e-mail"
                required
              />
            </div>

            <div class="form-group">
              <label for="password">Hasło</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Wpisz hasło"
                required
              />
            </div>

            <button type="submit" class="btn-submit">Zaloguj się</button>
          </form>

          <div class="auth-footer">
            <p>Nie masz konta? <a href="register.html">Zarejestruj się</a></p>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; 2026 HR Platform. Projekt systemu HR i rekrutacji.</p>
    </footer>

    <script src="../scripts/login.js"></script>
  </body>
</html>
