<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zmiana hasła - Panel administratora - HR Platform</title>
    <link rel="stylesheet" href="../styles/index.css" />
  </head>
  <body>
    <header class="header">
      <nav class="navbar">
        <div class="logo">
          <img src="../images/logo.png" alt="Logo HR Platform" />
        </div>
        <ul class="nav-links">
          <li><a href="admin-dashboard.html">Panel admina</a></li>
          <li><a href="change-password-admin.html">Zmień hasło</a></li>
          <li><a href="#" id="logoutBtn">Wyloguj</a></li>
        </ul>
      </nav>
    </header>

    <main class="dashboard-wrapper">
      <section class="dashboard-card">
        <h2>Zmień hasło administratora</h2>
        <form id="changePasswordForm" class="profile-form">
          <div>
            <label for="oldPassword">Stare hasło</label>
            <input
              type="password"
              id="oldPassword"
              class="profile-input"
              required
            />
          </div>

          <div>
            <label for="newPassword">Nowe hasło</label>
            <input
              type="password"
              id="newPassword"
              class="profile-input"
              required
            />
          </div>

          <div>
            <label for="confirmPassword">Potwierdź nowe hasło</label>
            <input
              type="password"
              id="confirmPassword"
              class="profile-input"
              required
            />
          </div>

          <button type="submit" class="dashboard-btn">Zmień hasło</button>
        </form>
      </section>
    </main>

    <script src="../scripts/navbar-anim.js"></script>
    <script src="../scripts/change-password-admin.js"></script>
  </body>
</html>
