<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aplikacje kandydatów - HR Platform</title>
    <link rel="stylesheet" href="../styles/index.css" />
  </head>
  <body>
    <header class="header">
      <nav class="navbar">
        <div class="logo">HR Platform</div>
        <ul class="nav-links">
          <li><a href="index.html">Start</a></li>
          <li><a href="hr-dashboard.html">Panel HR</a></li>
          <li><a href="hr-applications.html">Aplikacje</a></li>
          <li><a href="hr-employees.html">Pracownicy</a></li>
          <li><a href="change-password.html">Zmień hasło</a></li>
          <li><a href="#" id="logoutBtn">Wyloguj</a></li>
        </ul>
      </nav>
    </header>

    <main class="dashboard-wrapper">
      <section class="welcome-section">
        <div class="welcome-card">
          <h1>Aplikacje kandydatów</h1>
          <p>
            Przeglądaj zgłoszenia kandydatów do dostępnych ofert pracy. Sprawdź
            CV kandydatów i zatrudniaj najlepszych pracowników.
          </p>
        </div>
      </section>

      <section class="offers-section">
        <h2>Lista aplikacji</h2>
        <div id="applicationsList" class="offers-grid">
          <p>Ładowanie aplikacji...</p>
        </div>
      </section>
    </main>

    <!-- Modal do akceptowania kandydata -->
    <div id="acceptModal" class="modal" style="display: none">
      <div class="modal-content">
        <span class="close-modal" onclick="closeAcceptModal()">&times;</span>
        <h2>Akceptuj kandydata</h2>
        <form id="acceptForm">
          <div class="form-group">
            <label for="candidateName">Kandydat:</label>
            <input type="text" id="candidateName" readonly />
          </div>
          <div class="form-group">
            <label for="position">Stanowisko:</label>
            <input type="text" id="position" required />
          </div>
          <div class="form-group">
            <label for="salary">Zarobki (PLN):</label>
            <input type="number" id="salary" step="0.01" required />
          </div>
          <div class="form-actions">
            <button
              type="button"
              class="btn-secondary"
              onclick="closeAcceptModal()"
            >
              Anuluj
            </button>
            <button type="button" class="btn-primary" onclick="generatePDF()">
              Wygeneruj umowę PDF
            </button>
            <button type="submit" class="btn-primary">Akceptuj i zapisz</button>
          </div>
        </form>
      </div>
    </div>

    <script src="../scripts/navbar-anim.js"></script>
    <script src="../scripts/hr-applications.js"></script>
  </body>
</html>
